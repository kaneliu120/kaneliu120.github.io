title: "Kane Liu"
description: "AI replacement industry analysis"
url: "https://kaneliu120.github.io"
timezone: "Asia/Manila"
markdown: kramdown
kramdown:
  input: GFM
permalink: /:title/
collections:
  zh_docs:
    output: true
    permalink: /zh/:name/
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "zh_docs"
    values:
      layout: zh_doc
