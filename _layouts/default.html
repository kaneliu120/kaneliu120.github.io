<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.subtitle %}{{ page.subtitle }}{% else %}{{ site.description }}{% endif %}">
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="site-identity">
          <a class="brand" href="{{ '/' | relative_url }}">Kane Liu</a>
          <p class="site-note">GitHub Pages article archive</p>
        </div>
        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}">Articles</a>
          <a href="{{ '/en/' | relative_url }}">English Industry Library</a>
          <a href="{{ '/zh/' | relative_url }}">中文行业库</a>
          <a href="{{ '/profile/' | relative_url }}">GitHub README</a>
          <a href="https://github.com/kaneliu120">GitHub</a>
        </nav>
      </header>
      <main>
        {{ content }}
      </main>
    </div>
  </body>
</html>
