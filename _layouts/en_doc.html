---
layout: default
---

<article class="article">
  <header class="article-header">
    <p class="eyebrow">English Rewrite</p>
    {% if page.subtitle %}
    <p class="lede">{{ page.subtitle }}</p>
    {% endif %}
    <div class="article-meta">
      <span>English</span>
      {% if page.source_code %}
      <span>{{ page.source_code }}</span>
      {% endif %}
      {% if page.source_file %}
      <span>{{ page.source_file }}</span>
      {% endif %}
    </div>
  </header>
  <div class="article-body en-doc-body">
    {{ content }}
  </div>
</article>
